[rewrite_local]
^https:\/\/api\.revenuecat\.com\/v1\/subscribers\/ url script-request-header EchoLoop_RC.js

[SCRIPT]
EchoLoop_RC.js = type=http-request, pattern=^https:\/\/api\.revenuecat\.com\/v1\/subscribers\/, script-path=https://cdn.jsdelivr.net/gh/Leslie159357/loon-plugin@main/plugins/EchoLoop/EchoLoop_RC.js, timeout=10

[MITM]
hostname = api.revenuecat.com

