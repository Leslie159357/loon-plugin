# 🐟 鱼吃鱼 (大鱼/Dayu) — Loon 配置
# https://github.com/你的用户名/dayu-hack

[General]
skip-proxy = *
bypass-tun = *
dns-server = system, 223.5.5.5

[Proxy]
# 无需额外代理，MITM 直连即可

[MITM]
hostname = prod-dayu.lanfeitech.com, game-admin.lanfeitech.com
# 安装 CA 证书并信任

[Script]
# ⚡ 资源修改脚本 (拦截并修改请求体)
http-request ^https?://prod-dayu\.lanfeitech\.com/api/user/update_user_resource script-path=https://raw.githubusercontent.com/你的用户名/dayu-hack/main/dayu_loon.js, requires-body=true, tag=鱼吃鱼-资源修改
http-request ^https?://prod-dayu\.lanfeitech\.com/api/user/update_user_goods script-path=https://raw.githubusercontent.com/你的用户名/dayu-hack/main/dayu_loon.js, requires-body=true, tag=鱼吃鱼-物品修改
http-request ^https?://prod-dayu\.lanfeitech\.com/api/user/update_fish_fragment script-path=https://raw.githubusercontent.com/你的用户名/dayu-hack/main/dayu_loon.js, requires-body=true, tag=鱼吃鱼-鱼碎片修改

# 📋 日志查看 (可选)
http-response ^https?://prod-dayu\.lanfeitech\.com/api/user/update_user_resource script-path=https://raw.githubusercontent.com/你的用户名/dayu-hack/main/dayu_loon_log.js, requires-body=true, tag=鱼吃鱼-日志

[Rule]
# 直接连接游戏服务器 (不走代理)
DOMAIN-SUFFIX,lanfeitech.com,DIRECT
